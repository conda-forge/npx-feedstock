{% set name = "npx" %}
{% set version = "0.1.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: efcedd9f8090864c1ad154307281302e931dfab60b495fada78bb505ac884eb9

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3
    - pip
    - flit
    - numpy >=1.20.0
  run:
    - python >=3
    - numpy >=1.20.0

test:
  imports:
    - npx
  requires:
    - pytest-codeblocks
    - pytest
  source_files:
    - README.md
    - tests
  commands:
    - python -m pytest --codeblocks

about:
  home: https://github.com/nschloe/npx
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Useful extensions for NumPy
  dev_url: https://github.com/nschloe/npx

extra:
  recipe-maintainers:
    - nschloe
